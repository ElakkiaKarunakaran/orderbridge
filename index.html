<!DOCTYPE html>
<html>
<head>
  <title>OrderBridge - Order Status</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2c3e50; color: white; }
    tr:hover { background: #f1f1f1; }
    .domain { padding: 4px 10px; border-radius: 4px; color: white; font-size: 12px; }
    .order_capture { background: #3498db; }
    .fulfilment { background: #e67e22; }
    .logistics { background: #27ae60; }
  </style>
</head>
<body>
  <h1>OrderBridge — Unified Order Events (3 Domains)</h1>
  <table>
    <thead>
      <tr><th>Order ID</th><th>Domain</th><th>Event</th><th>Timestamp</th></tr>
    </thead>
    <tbody id="eventBody">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    Promise.all([
      fetch('http://localhost:3000/orders').then(r => r.json()),
      fetch('http://localhost:4000/fulfilment').then(r => r.json()),
      fetch('http://localhost:5000/logistics').then(r => r.json())
    ]).then(([crm, fulfilment, logistics]) => {
      const events = [
        ...crm.map(o => ({order_id: o.id, domain: 'order_capture', event_type: o.status, timestamp: o.timestamp})),
        ...fulfilment.map(f => ({order_id: f.order_id, domain: 'fulfilment', event_type: f.event_type, timestamp: f.timestamp})),
        ...logistics.map(l => ({order_id: l.order_id, domain: 'logistics', event_type: l.event_type, timestamp: l.timestamp}))
      ];
      const body = document.getElementById('eventBody');
      body.innerHTML = '';
      events.forEach(e => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${e.order_id}</td>
          <td><span class="domain ${e.domain}">${e.domain}</span></td>
          <td>${e.event_type}</td>
          <td>${e.timestamp}</td>
        `;
        body.appendChild(row);
      });
    }).catch(err => {
      document.getElementById('eventBody').innerHTML = '<tr><td colspan="4">Error — make sure all 3 mock servers are running (ports 3000, 4000, 5000)</td></tr>';
    });
  </script>
</body>
</html>
