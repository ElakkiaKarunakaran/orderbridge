<!DOCTYPE html>
<html>
<head>
  <title>OrderBridge - Order Status</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2c3e50; color: white; }
    tr:hover { background: #f1f1f1; }
    .status { padding: 4px 10px; border-radius: 4px; color: white; font-size: 12px; }
    .placed { background: #3498db; }
    .dispatched { background: #e67e22; }
    .delivered { background: #27ae60; }
  </style>
</head>
<body>
  <h1>OrderBridge — Live Order Status</h1>
  <table id="orderTable">
    <thead>
      <tr><th>Order ID</th><th>Customer</th><th>Status</th><th>Timestamp</th></tr>
    </thead>
    <tbody id="orderBody">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    fetch('http://localhost:3000/orders')
      .then(res => res.json())
      .then(orders => {
        const body = document.getElementById('orderBody');
        body.innerHTML = '';
        orders.forEach(o => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${o.id}</td>
            <td>${o.customer}</td>
            <td><span class="status ${o.status}">${o.status}</span></td>
            <td>${o.timestamp}</td>
          `;
          body.appendChild(row);
        });
      })
      .catch(err => {
        document.getElementById('orderBody').innerHTML = '<tr><td colspan="4">Error loading orders — is json-server running?</td></tr>';
      });
  </script>
</body>
</html>
